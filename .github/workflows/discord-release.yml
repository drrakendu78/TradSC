name: Discord Release Notification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de release (ex: v3.5.0)"
        required: true
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Tag cible (release event ou lancement manuel)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi

          # Toujours récupérer la release "live" via API (évite le payload figé des reruns)
          API_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG"
          RELEASE_JSON=$(curl -sSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API_URL")
          URL=$(echo "$RELEASE_JSON" | jq -r '.html_url // empty')
          BODY=$(echo "$RELEASE_JSON" | jq -r '.body // empty')

          # Garder uniquement les sections principales (sans checksums / SmartScreen / Store)
          CLEAN=$(printf '%s\n' "$BODY" \
            | sed 's/\r$//' \
            | sed '/^## .*[Cc]hecksums/,$d' \
            | sed '/^## Note Windows SmartScreen/,$d' \
            | sed '/^## Microsoft Store/,$d' \
            | sed '/^# /d' \
            | sed '/^---$/d' \
            | awk 'NF{blank=0; print; next} !blank{print ""; blank=1}' \
            | head -c 2000)

          # Construire l'embed Discord
          PAYLOAD=$(jq -n \
            --arg title "StarTrad FR $TAG" \
            --arg desc "$CLEAN" \
            --arg url "$URL" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 5814783,
                footer: { text: "StarTrad FR - Mise à jour" },
                timestamp: (now | todate)
              }]
            }')

          curl -s -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"
