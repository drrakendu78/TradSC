<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0a0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Traduction · StarTrad FR</title>
  <link rel="manifest" href="/manifest.json?v=3">
  <link rel="icon" type="image/png" href="/logo.png?v=3">
  <link rel="apple-touch-icon" href="/logo.png?v=3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/app.css?v=3">
  <style>
    .ver-card { padding: 18px; display: flex; flex-direction: column; gap: 14px; min-width: 0; }
    .ver-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ver-head .card-col { flex: 1 1 150px; min-width: 0; }
    .ver-name {
      font-family: var(--serif);
      font-size: 24px;
      letter-spacing: -0.01em;
      line-height: 1.05;
      color: var(--ink);
      font-weight: 400;
      word-break: break-word;
    }
    .ver-path {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: var(--mono);
      max-width: 100%;
    }
    .ver-status-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex-shrink: 0;
    }
    .source-block { display: flex; flex-direction: column; gap: 6px; }
    .source-hint { font-size: 12px; color: var(--warning); font-weight: 500; }
    .actions-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .actions-row .btn { flex: 1 1 0; min-width: 0; padding: 12px 12px; }
    .actions-row .btn.single { flex: 1 1 100%; }
    .summary-pill {
      display: inline-flex;
      gap: 6px;
      align-items: baseline;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      font-size: 12px;
      color: var(--muted);
    }
    .summary-pill strong {
      font-family: var(--serif);
      color: var(--ink);
      font-weight: 400;
      font-size: 16px;
      margin-right: 2px;
    }

    /* Responsive tablette / paysage */
    @media (min-width: 720px) {
      #list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .ver-name { font-size: 30px; }
      .actions-row .btn { flex: 0 1 auto; padding: 12px 20px; }
    }
    @media (min-width: 1024px) {
      #list { grid-template-columns: repeat(3, 1fr); gap: 16px; }
      .ver-name { font-size: 32px; }
    }
    @media (orientation: landscape) and (max-height: 520px) {
      #list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .ver-card { padding: 14px; gap: 10px; }
      .ver-name { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="page-header">
      <div class="brand">
        <div class="brand-mark"><img src="/logo.png" alt="StarTrad FR"></div>
        <div class="brand-text">
          <span class="brand-name">Traduction</span>
          <span class="brand-sub">Install · Update · Sources</span>
        </div>
      </div>
      <div class="status-chip">
        <span class="status-dot connecting" id="dot"></span>
        <span id="statusText">Connexion</span>
      </div>
    </header>

    <div class="summary-pill fade-up" id="summary">Chargement…</div>

    <div id="list" class="grid-1" style="margin-top: 14px;">
      <div class="skel"></div><div class="skel"></div>
    </div>
  </div>

  <nav class="dock" aria-label="Navigation">
    <a href="/" class="dock-item" id="navDash" aria-label="Dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
      <span class="dock-label">Dashboard</span>
    </a>
    <a href="/traduction" class="dock-item active" id="navTrad" aria-label="Traduction">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
      <span class="dock-label">Traduction</span>
    </a>
    <a href="/outils" class="dock-item" id="navTools" aria-label="Outils">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 1 1.4 0l1.6 1.6a1 1 0 0 1 0 1.4l-7.8 7.8-3.1.8.8-3.1 7.1-7.1Z"></path><path d="M16 4l4 4"></path><path d="M12 20h9"></path></svg>
      <span class="dock-label">Outils</span>
    </a>
    <a href="/infos" class="dock-item" id="navInfos" aria-label="Infos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <span class="dock-label">Infos</span>
    </a>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="/companion.js?v=3"></script>
  <script>
    (function() {
      var token = new URLSearchParams(location.search).get('token') || '';
      var wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws?token=' + encodeURIComponent(token);
      var ws = null;
      var reconnectTimer = null;
      var backoff = 500;
      var ready = false;
      var CACHE_KEY = 'startrad-companion-translation-cache-v1';
      var state = { versions: [], links: [], busy: {} };

      function el(id) { return document.getElementById(id); }

      function saveCache() {
        try {
          localStorage.setItem(CACHE_KEY, JSON.stringify({
            versions: Array.isArray(state.versions) ? state.versions : [],
            links: Array.isArray(state.links) ? state.links : [],
            busy: state.busy && typeof state.busy === 'object' ? state.busy : {},
            ready: !!ready
          }));
        } catch (e) {}
      }

      function loadCache() {
        try {
          var raw = localStorage.getItem(CACHE_KEY);
          if (!raw) return;
          var cached = JSON.parse(raw);
          if (!cached || typeof cached !== 'object') return;
          state.versions = Array.isArray(cached.versions) ? cached.versions : state.versions;
          state.links = Array.isArray(cached.links) ? cached.links : state.links;
          state.busy = cached.busy && typeof cached.busy === 'object' ? cached.busy : state.busy;
          ready = !!cached.ready || state.versions.length > 0;
        } catch (e) {}
      }

      function setStatus(cls, text) {
        el('dot').className = 'status-dot ' + (cls || '');
        el('statusText').textContent = text;
      }

      function toast(msg, isErr) {
        var t = el('toast');
        t.textContent = msg;
        t.className = 'toast show' + (isErr ? ' err' : '');
        setTimeout(function() { t.className = 'toast' + (isErr ? ' err' : ''); }, 1900);
      }

      function send(msg) {
        if (!ws || ws.readyState !== 1) { toast('Déconnecté', true); return false; }
        ws.send(JSON.stringify(msg));
        return true;
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }

      function statusOf(v) {
        var b = state.busy[v.setting];
        if (b) return { label: labelBusy(b.action), cls: 'accent' };
        if (!v.installed) return { label: 'Non installé', cls: 'muted' };
        if (v.upToDate === false) return { label: 'Mise à jour dispo', cls: 'warn' };
        return { label: 'À jour', cls: 'accent' };
      }

      function labelBusy(a) {
        if (a === 'install') return 'Installation…';
        if (a === 'update') return 'Mise à jour…';
        if (a === 'uninstall') return 'Désinstallation…';
        return 'En cours…';
      }

      function render() {
        if (!ready) {
          el('summary').innerHTML = 'Chargement des versions…';
          el('list').innerHTML = '<div class="skel"></div><div class="skel"></div>';
          return;
        }

        if (!state.versions || state.versions.length === 0) {
          el('summary').innerHTML = '<strong>0</strong> version détectée';
          el('list').innerHTML = '<div class="empty">Star Citizen non trouvé. Lance le launcher RSI puis recharge.</div>';
          return;
        }

        var total = state.versions.length;
        var installed = state.versions.filter(function(v) { return v.installed; }).length;
        el('summary').innerHTML =
          '<strong>' + total + '</strong> version' + (total > 1 ? 's' : '') + ' · ' +
          '<strong>' + installed + '</strong> installée' + (installed > 1 ? 's' : '');

        el('list').innerHTML = state.versions.map(function(v, idx) {
          var s = statusOf(v);
          var b = state.busy[v.setting];
          var hasSelection = !!v.selectedLink;
          var needsPick = (!v.installed || v.upToDate === false) && !hasSelection;

          var sourceBlock = '';
          if (state.links && state.links.length > 0) {
            var opts = '<option value="">— Choisir une source —</option>';
            state.links.forEach(function(link) {
              var sel = String(link.url) === String(v.selectedLink || '') ? ' selected' : '';
              opts += '<option value="' + escapeHtml(link.url) + '"' + sel + '>' + escapeHtml(link.name) + '</option>';
            });
            sourceBlock =
              '<div class="source-block">' +
                '<span class="tiny muted" style="text-transform:uppercase;letter-spacing:.12em;font-weight:600">Source</span>' +
                '<select class="select" data-role="source"' + (b ? ' disabled' : '') + '>' + opts + '</select>' +
              '</div>';
          } else {
            sourceBlock = '<div class="source-hint">Aucune source disponible (API hors-ligne ?).</div>';
          }

          var actions = '<div class="actions-row">';
          if (b) {
            actions += '<div class="progress" style="flex:1 1 100%"><div class="progress-bar indeterminate"></div></div>';
            actions += '<button class="btn ghost single" disabled>' + labelBusy(b.action) + '</button>';
          } else if (!v.installed) {
            actions += '<button class="btn primary single" data-act="install"' + (hasSelection ? '' : ' disabled') + '>Installer</button>';
          } else if (v.upToDate === false) {
            actions += '<button class="btn primary" data-act="update"' + (hasSelection ? '' : ' disabled') + '>Mettre à jour</button>';
            actions += '<button class="btn danger" data-act="uninstall">Désinstaller</button>';
          } else {
            actions += '<button class="btn danger single" data-act="uninstall">Désinstaller</button>';
          }
          actions += '</div>';

          var pickHint = needsPick ? '<div class="source-hint">Choisis une source avant d\'installer.</div>' : '';

          return '<div class="card ver-card fade-up" data-setting="' + escapeHtml(v.setting) + '" style="animation-delay:' + (idx * 60) + 'ms">' +
                   '<div class="ver-head">' +
                     '<div class="card-col">' +
                       '<span class="ver-name">' + escapeHtml(v.label || v.setting) + '</span>' +
                       (v.path ? '<span class="ver-path">' + escapeHtml(v.path) + '</span>' : '') +
                     '</div>' +
                     '<div class="ver-status-group"><span class="pill ' + s.cls + '">' + s.label + '</span></div>' +
                   '</div>' +
                   sourceBlock + pickHint + actions +
                 '</div>';
        }).join('');

        el('list').querySelectorAll('[data-setting]').forEach(function(card) {
          var setting = card.dataset.setting;
          var sel = card.querySelector('[data-role="source"]');
          if (sel) {
            sel.addEventListener('change', function() {
              send({ type: 'translation.select', setting: setting, link: sel.value || null });
            });
          }
          card.querySelectorAll('[data-act]').forEach(function(btn) {
            btn.addEventListener('click', function() {
              send({ type: 'translation.' + btn.dataset.act, setting: setting });
            });
          });
        });
      }

      function connect() {
        setStatus('connecting', 'Connexion');
        try { ws = new WebSocket(wsUrl); } catch (e) { scheduleReconnect(); return; }
        ws.addEventListener('open', function() {
          backoff = 500;
          setStatus('', 'Connecté');
          send({ type: 'translation.query' });
        });
        ws.addEventListener('message', function(ev) {
          try { handle(JSON.parse(ev.data)); } catch (e) {}
        });
        ws.addEventListener('close', function() {
          setStatus('offline', 'Déconnecté');
          scheduleReconnect();
        });
        ws.addEventListener('error', function() { try { ws.close(); } catch (e) {} });
      }

      function handle(msg) {
        if (!msg || typeof msg !== 'object') return;
        if (msg.type === 'translation.state') {
          if (Array.isArray(msg.versions)) state.versions = msg.versions;
          if (Array.isArray(msg.links)) state.links = msg.links;
          if (msg.busy && typeof msg.busy === 'object') state.busy = msg.busy;
          ready = true;
          saveCache();
          render();
          return;
        }
        if (msg.type === 'toast') { toast(msg.message || '', !!msg.isError); return; }
        if (msg.type === 'error') { toast(msg.message || 'Erreur', true); return; }
      }

      function scheduleReconnect() {
        if (reconnectTimer) return;
        reconnectTimer = setTimeout(function() { reconnectTimer = null; connect(); }, backoff);
        backoff = Math.min(backoff * 2, 5000);
      }

      ['navDash', 'navTrad', 'navInfos', 'navTools'].forEach(function(id) {
        var a = el(id);
        if (a) a.href = a.getAttribute('href') + location.search;
      });

      window.__companionRefresh = function() {
        send({ type: 'translation.query' });
        return new Promise(function(resolve) { setTimeout(resolve, 450); });
      };

      loadCache();
      render();
      connect();
    })();
  </script>
</body>
</html>
