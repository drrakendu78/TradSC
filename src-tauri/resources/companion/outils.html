<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0a0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Outils · StarTrad FR</title>
  <link rel="manifest" href="/manifest.json?v=5">
  <link rel="icon" type="image/png" href="/logo.png?v=5">
  <link rel="apple-touch-icon" href="/logo.png?v=5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/app.css?v=5">
  <style>
    .tool-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-card);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .tool-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .tool-title {
      font-family: var(--serif);
      font-size: 24px;
      line-height: 1;
      letter-spacing: -0.015em;
    }
    .tool-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.45;
    }
    .inline-search {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--bg-2);
      color: var(--ink);
      padding: 12px 13px;
      font: inherit;
    }
    .rpc-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .rpc-status {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .rpc-state {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
    }
    .rpc-meta {
      font-size: 11px;
      color: var(--muted);
    }
    .preset-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .preset-item {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--bg-2);
      padding: 13px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .preset-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      word-break: break-word;
    }
    .preset-meta {
      font-size: 11px;
      color: var(--muted);
    }
    .version-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .version-btn {
      min-width: 84px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      font-size: 11px;
      font-weight: 700;
    }
    .version-btn.has-source {
      border-color: color-mix(in oklab, var(--accent) 34%, transparent);
      color: var(--accent);
      background: color-mix(in oklab, var(--accent) 10%, transparent);
    }
    .version-btn:disabled {
      opacity: .45;
    }
    .mini-note {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }
    .tools-tabs {
      display: flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: color-mix(in oklab, var(--bg-2) 84%, transparent);
      margin-top: 16px;
    }
    .tools-tab {
      flex: 1 1 0;
      min-width: 0;
      border: 0;
      border-radius: 999px;
      padding: 11px 14px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      transition: background .18s ease, color .18s ease, box-shadow .18s ease;
    }
    .tools-tab.active {
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 10px 24px rgba(0,0,0,.16);
    }
    .tools-panel[hidden] {
      display: none !important;
    }
    .online-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .online-card {
      position: relative;
      min-height: 212px;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid color-mix(in oklab, var(--line) 86%, rgba(255,255,255,.08));
      background:
        radial-gradient(120% 80% at 50% 0%, rgba(255,255,255,.10) 0%, transparent 58%),
        linear-gradient(180deg, rgba(14,16,24,.74) 0%, rgba(8,9,14,.92) 100%);
      box-shadow: 0 16px 34px rgba(0,0,0,.22);
      isolation: isolate;
    }
    .online-card-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .online-card::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(5,8,14,.18) 0%, rgba(5,8,14,.48) 44%, rgba(5,8,14,.92) 100%),
        radial-gradient(120% 70% at 50% 0%, rgba(255,255,255,.10) 0%, transparent 56%);
    }
    .online-card-body {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 212px;
      padding: 12px;
      gap: 12px;
    }
    .online-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    .online-card-chip-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }
    .online-card-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(5,10,18,.42);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
    }
    .online-card-chip svg {
      width: 11px;
      height: 11px;
      flex: none;
    }
    .online-card-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(5,10,18,.42);
      backdrop-filter: blur(10px);
      color: #fff;
      padding: 0;
    }
    .online-card-footer {
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(7,10,18,.50);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 11px 12px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
    }
    .online-card-title {
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .online-card-author {
      color: rgba(255,255,255,.76);
      font-size: 10px;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .online-card-download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      flex: none;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.16);
      color: #fff;
      padding: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }
    .online-card-download[disabled],
    .online-card-link[disabled] {
      opacity: .45;
    }
    @media (min-width: 720px) {
      .online-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
    .preset-item-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      padding: 0;
      flex: none;
    }
    .icon-btn.danger {
      color: color-mix(in oklab, #f27474 72%, var(--ink));
      border-color: color-mix(in oklab, #f27474 24%, var(--line));
      background: color-mix(in oklab, #f27474 10%, var(--surface));
    }
    .icon-btn svg {
      width: 15px;
      height: 15px;
    }
    .online-card {
      min-height: 0;
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: 0 10px 24px rgba(0,0,0,.10);
      overflow: hidden;
    }
    .online-card::after {
      display: none;
    }
    .online-card-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .online-card-media {
      position: relative;
      height: 148px;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      background:
        radial-gradient(120% 90% at 50% 0%, color-mix(in oklab, var(--accent) 16%, transparent), transparent 58%),
        var(--bg-2);
    }
    .online-card-media::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10,10,12,.24) 0%, rgba(10,10,12,.36) 100%);
      pointer-events: none;
    }
    .online-card-body {
      min-height: 0;
      padding: 0;
      gap: 0;
      background: var(--surface);
    }
    .online-card-top {
      position: absolute;
      inset: 10px 10px auto 10px;
      z-index: 2;
    }
    .online-card-chip-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      margin-left: auto;
    }
    .online-card-chip {
      border: 1px solid rgba(255,255,255,.40);
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(8px);
      color: var(--ink);
      font-size: 10px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(0,0,0,.12);
    }
    .online-card-link {
      border: 1px solid rgba(255,255,255,.52);
      background: rgba(255,255,255,1);
      backdrop-filter: blur(8px);
      color: var(--ink);
      box-shadow: 0 10px 22px rgba(0,0,0,.16);
      width: 34px;
      height: 34px;
    }
    .online-card-link svg {
      width: 16px;
      height: 16px;
      flex: none;
    }
    .online-card-footer {
      border: 0;
      background: var(--surface);
      backdrop-filter: none;
      border-radius: 0;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }
    .online-card-meta {
      min-width: 0;
    }
    .online-card-title {
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
      word-break: break-word;
    }
    .online-card-author {
      color: var(--muted);
      font-size: 10px;
      margin-top: 4px;
    }
    .online-card-download {
      width: 100%;
      min-width: 0;
      height: 36px;
      padding: 0 12px;
      gap: 7px;
      border: 1px solid var(--line-2);
      background: color-mix(in oklab, var(--surface) 92%, white 8%);
      color: var(--ink);
      box-shadow: 0 8px 18px rgba(0,0,0,.10);
      font-size: 11px;
      font-weight: 700;
    }
    .online-card-download svg {
      width: 14px;
      height: 14px;
      flex: none;
    }
    .online-card-download span {
      letter-spacing: -0.01em;
    }
    @media (max-width: 520px) {
      .online-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .online-card-media {
        height: 132px;
      }
      .online-card-footer {
        padding: 10px;
      }
      .online-card-title {
        font-size: 13px;
      }
      .online-card-author {
        font-size: 9px;
      }
      .online-card-download {
        height: 34px;
        padding: 0 10px;
        font-size: 10px;
      }
      .online-card-download svg {
        width: 13px;
        height: 13px;
      }
      .online-card-chip {
        padding: 5px 7px;
        font-size: 9px;
      }
      .online-card-link {
        width: 30px;
        height: 30px;
      }
      .online-card-link svg {
        width: 14px;
        height: 14px;
      }
    }
    :root[data-theme="dark"] .online-card {
      border-color: rgba(255,255,255,.10);
      box-shadow: 0 12px 28px rgba(0,0,0,.26);
    }
    :root[data-theme="dark"] .online-card-footer {
      background: #15151a;
    }
    :root[data-theme="dark"] .online-card-media::after {
      background: linear-gradient(180deg, rgba(6,8,12,.18) 0%, rgba(6,8,12,.46) 100%);
    }
    :root[data-theme="dark"] .online-card-chip,
    :root[data-theme="dark"] .online-card-link {
      border-color: rgba(255,255,255,.14);
      background: rgba(10,10,12,.82);
      color: #f6f6f4;
      box-shadow: 0 10px 22px rgba(0,0,0,.28);
    }
    :root[data-theme="dark"] .online-card-download {
      border-color: rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: #f6f6f4;
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
    }
    @media (prefers-color-scheme: dark) {
      .online-card {
        border-color: rgba(255,255,255,.10);
        box-shadow: 0 12px 28px rgba(0,0,0,.26);
      }
      .online-card-footer {
        background: #15151a;
      }
      .online-card-media::after {
        background: linear-gradient(180deg, rgba(6,8,12,.18) 0%, rgba(6,8,12,.46) 100%);
      }
      .online-card-chip,
      .online-card-link {
        border-color: rgba(255,255,255,.14);
        background: rgba(10,10,12,.82);
        color: #f6f6f4;
        box-shadow: 0 10px 22px rgba(0,0,0,.28);
      }
      .online-card-download {
        border-color: rgba(255,255,255,.14);
        background: rgba(255,255,255,.08);
        color: #f6f6f4;
        box-shadow: 0 10px 22px rgba(0,0,0,.22);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="page-header">
      <div class="brand">
        <div class="brand-mark"><img src="/logo.png" alt="StarTrad FR"></div>
        <div class="brand-text">
          <span class="brand-name">Outils</span>
          <span class="brand-sub">Discord · Presets locaux · en ligne</span>
        </div>
      </div>
      <div class="status-chip">
        <span class="status-dot connecting" id="dot"></span>
        <span id="statusText">Connexion</span>
      </div>
    </header>

    <section class="section fade-up">
      <div class="section-head">
        <h2 class="section-title">Discord RPC</h2>
      </div>
      <div id="discordBlock"><div class="skel"></div></div>
    </section>

    <div class="tools-tabs fade-up" style="animation-delay:.05s" role="tablist" aria-label="Presets">
      <button class="tools-tab active" id="toolsTabLocal" type="button" role="tab" aria-selected="true">Locaux</button>
      <button class="tools-tab" id="toolsTabOnline" type="button" role="tab" aria-selected="false">En ligne</button>
    </div>

    <section class="section fade-up tools-panel" id="toolsPanelLocal" style="animation-delay:.08s">
      <div class="section-head">
        <h2 class="section-title">Switcher preset</h2>
        <span class="count-pill" id="presetSummary">-</span>
      </div>
      <input id="presetSearch" class="inline-search" type="search" placeholder="Rechercher un preset local...">
      <div id="presetBlock" class="preset-list" style="margin-top:12px;"><div class="skel"></div><div class="skel"></div></div>
      <p class="mini-note" style="margin-top:10px">Tap sur une version pour copier ce preset vers le PC sans quitter le jeu.</p>
    </section>

    <section class="section fade-up tools-panel" id="toolsPanelOnline" style="animation-delay:.1s" hidden>
      <div class="section-head">
        <h2 class="section-title">Presets en ligne</h2>
        <span class="count-pill" id="onlinePresetSummary">-</span>
      </div>
      <input id="onlinePresetSearch" class="inline-search" type="search" placeholder="Rechercher un preset en ligne...">
      <div class="version-actions" style="margin-top:10px">
        <button class="version-btn has-source" id="onlineSortLatest">Recents</button>
        <button class="version-btn" id="onlineSortPopular">Populaires</button>
      </div>
      <div id="onlinePresetBlock" class="preset-list" style="margin-top:12px;"><div class="skel"></div><div class="skel"></div></div>
      <div id="onlinePresetSentinel" style="height:1px"></div>
      <p class="mini-note" style="margin-top:10px">Un tap telecharge le preset sur le PC puis il apparait dans les presets locaux.</p>
    </section>
  </div>

  <nav class="dock" aria-label="Navigation">
    <a href="/" class="dock-item" id="navDash" aria-label="Dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
      <span class="dock-label">Dashboard</span>
    </a>
    <a href="/traduction" class="dock-item" id="navTrad" aria-label="Traduction">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
      <span class="dock-label">Traduction</span>
    </a>
    <a href="/outils" class="dock-item active" id="navTools" aria-label="Outils">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 1 1.4 0l1.6 1.6a1 1 0 0 1 0 1.4l-7.8 7.8-3.1.8.8-3.1 7.1-7.1Z"></path><path d="M16 4l4 4"></path><path d="M12 20h9"></path></svg>
      <span class="dock-label">Outils</span>
    </a>
    <a href="/infos" class="dock-item" id="navInfos" aria-label="Infos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <span class="dock-label">Infos</span>
    </a>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="/companion.js?v=5"></script>
  <script>
    (function() {
      var token = new URLSearchParams(location.search).get('token') || '';
      var wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws?token=' + encodeURIComponent(token);
      var ws = null;
      var reconnectTimer = null;
      var backoff = 500;
      var onlineObserver = null;
      var onlineScrollArmed = false;
      var CACHE_KEY = 'startrad-companion-tools-cache-v1';
      var state = {
        discord: null,
        presets: { versions: [], characters: [] },
        online: {
          items: [],
          page: 1,
          order: 'latest',
          search: '',
          hasNextPage: false,
          loading: false,
          downloading: {}
        },
        activeTab: 'local',
        query: ''
      };

      function el(id) { return document.getElementById(id); }

      function saveCache() {
        try {
          localStorage.setItem(CACHE_KEY, JSON.stringify({
            discord: state.discord || null,
            presets: state.presets || { versions: [], characters: [] },
            online: {
              items: state.online && Array.isArray(state.online.items) ? state.online.items : [],
              page: state.online && state.online.page ? state.online.page : 1,
              order: state.online && state.online.order ? state.online.order : 'latest',
              search: state.online && typeof state.online.search === 'string' ? state.online.search : '',
              hasNextPage: !!(state.online && state.online.hasNextPage)
            },
            activeTab: state.activeTab === 'online' ? 'online' : 'local'
          }));
        } catch (e) {}
      }

      function loadCache() {
        try {
          var raw = localStorage.getItem(CACHE_KEY);
          if (!raw) return;
          var cached = JSON.parse(raw);
          if (!cached || typeof cached !== 'object') return;
          state.discord = cached.discord || state.discord;
          state.presets = cached.presets || state.presets;
          if (cached.online && typeof cached.online === 'object') {
            state.online.items = Array.isArray(cached.online.items) ? cached.online.items : [];
            state.online.page = Number(cached.online.page || 1) || 1;
            state.online.order = cached.online.order === 'download' ? 'download' : 'latest';
            state.online.search = typeof cached.online.search === 'string' ? cached.online.search : '';
            state.online.hasNextPage = !!cached.online.hasNextPage;
          }
          state.activeTab = cached.activeTab === 'online' ? 'online' : 'local';
        } catch (e) {}
      }

      function renderTabs() {
        var isLocal = state.activeTab !== 'online';
        var localTab = el('toolsTabLocal');
        var onlineTab = el('toolsTabOnline');
        var localPanel = el('toolsPanelLocal');
        var onlinePanel = el('toolsPanelOnline');

        if (localTab) {
          localTab.className = 'tools-tab' + (isLocal ? ' active' : '');
          localTab.setAttribute('aria-selected', isLocal ? 'true' : 'false');
        }
        if (onlineTab) {
          onlineTab.className = 'tools-tab' + (!isLocal ? ' active' : '');
          onlineTab.setAttribute('aria-selected', !isLocal ? 'true' : 'false');
        }
        if (localPanel) localPanel.hidden = !isLocal;
        if (onlinePanel) onlinePanel.hidden = isLocal;

        if (!isLocal) {
          onlineScrollArmed = false;
          setupOnlineInfiniteScroll();
        }
      }

      function setStatus(cls, text) {
        el('dot').className = 'status-dot ' + (cls || '');
        el('statusText').textContent = text;
      }

      function toast(msg, isErr) {
        var t = el('toast');
        t.textContent = msg;
        t.className = 'toast show' + (isErr ? ' err' : '');
        setTimeout(function() { t.className = 'toast' + (isErr ? ' err' : ''); }, 1900);
      }

      function send(msg) {
        if (!ws || ws.readyState !== 1) return false;
        ws.send(JSON.stringify(msg));
        return true;
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }

      function renderDiscord() {
        var host = el('discordBlock');
        if (!state.discord) {
          host.innerHTML = '<div class="skel"></div>';
          return;
        }
        var d = state.discord;
        var label = !d.enabled ? 'OFF' : d.connected ? 'ON' : 'WAIT';
        var cls = !d.enabled ? 'muted' : d.connected ? 'accent' : 'warn';
        var details = d.activity && d.activity.details ? d.activity.details : 'StarTrad FR';
        var status = !d.enabled ? 'Presence desactivee' : d.connected ? 'Connecte a Discord' : 'En attente de Discord';

        host.innerHTML =
          '<div class="tool-card">' +
            '<div class="tool-head">' +
              '<div><div class="tool-title">Discord RPC</div><div class="tool-sub">Active ou coupe la presence Discord depuis le telephone.</div></div>' +
              '<span class="pill ' + cls + '">' + label + '</span>' +
            '</div>' +
            '<div class="rpc-row">' +
              '<div class="rpc-status">' +
                '<span class="rpc-state">' + escapeHtml(status) + '</span>' +
                '<span class="rpc-meta">' + escapeHtml(details) + '</span>' +
              '</div>' +
              '<button class="btn ' + (d.enabled ? 'danger' : 'accent') + '" id="discordToggleBtn">' + (d.enabled ? 'Couper Discord RPC' : 'Activer Discord RPC') + '</button>' +
            '</div>' +
          '</div>';

        var btn = el('discordToggleBtn');
        if (btn) {
          btn.addEventListener('click', function() {
            send({ type: 'discord.set_enabled', enabled: !d.enabled });
          });
        }
      }

      function renderPresets() {
        var host = el('presetBlock');
        var characters = Array.isArray(state.presets.characters) ? state.presets.characters : [];
        var query = (state.query || '').trim().toLowerCase();
        var filtered = !query ? characters : characters.filter(function(item) {
          return String(item.name || '').toLowerCase().indexOf(query) !== -1;
        });
        el('presetSummary').textContent = filtered.length + ' preset' + (filtered.length > 1 ? 's' : '');

        if (!characters.length) {
          host.innerHTML = '<div class="empty">Aucun preset local detecte.</div>';
          return;
        }
        if (!filtered.length) {
          host.innerHTML = '<div class="empty">Aucun preset ne correspond a la recherche.</div>';
          return;
        }

        host.innerHTML = filtered.map(function(item) {
          var versions = Array.isArray(state.presets.versions) ? state.presets.versions : [];
          var sourceVersions = Array.isArray(item.availableVersions) ? item.availableVersions : [];
          var sourceLabel = sourceVersions.length ? sourceVersions.join(' · ') : 'Aucune source';
          var buttons = versions.map(function(version) {
            var sourcePath = item.sources && item.sources[version] ? item.sources[version] : '';
            var fallbackSource = sourceVersions.length && item.sources ? item.sources[sourceVersions[0]] : '';
            return '<button class="version-btn' + (sourcePath ? ' has-source' : '') + '" data-name="' + escapeHtml(item.name) + '" data-version="' + escapeHtml(version) + '" data-source="' + escapeHtml(sourcePath || fallbackSource || '') + '"' + ((sourcePath || fallbackSource) ? '' : ' disabled') + '>' + escapeHtml(version) + '</button>';
          }).join('');

          return '<div class="preset-item">' +
                   '<div>' +
                     '<div class="preset-name">' + escapeHtml(item.name) + '</div>' +
                     '<div class="preset-meta">Present sur: ' + escapeHtml(sourceLabel) + '</div>' +
                   '</div>' +
                   '<div class="version-actions">' + buttons + '</div>' +
                 '</div>';
        }).join('');

        host.querySelectorAll('[data-version]').forEach(function(button) {
          button.addEventListener('click', function() {
            var sourcePath = button.dataset.source;
            var version = button.dataset.version;
            if (!sourcePath || !version) return;
            send({ type: 'preset.apply', sourcePath: sourcePath, version: version });
          });
        });
      }

      renderPresets = function() {
        var host = el('presetBlock');
        var characters = Array.isArray(state.presets.characters) ? state.presets.characters : [];
        var query = (state.query || '').trim().toLowerCase();
        var filtered = !query ? characters : characters.filter(function(item) {
          return String(item.name || '').toLowerCase().indexOf(query) !== -1;
        });
        el('presetSummary').textContent = filtered.length + ' preset' + (filtered.length > 1 ? 's' : '');

        if (!characters.length) {
          host.innerHTML = '<div class="empty">Aucun preset local detecte.</div>';
          return;
        }
        if (!filtered.length) {
          host.innerHTML = '<div class="empty">Aucun preset ne correspond a la recherche.</div>';
          return;
        }

        host.innerHTML = filtered.map(function(item) {
          var versions = Array.isArray(state.presets.versions) ? state.presets.versions : [];
          var sourceVersions = Array.isArray(item.availableVersions) ? item.availableVersions : [];
          var sourceLabel = sourceVersions.length ? sourceVersions.join(' - ') : 'Aucune source';
          var deleteSource = sourceVersions.length && item.sources ? item.sources[sourceVersions[0]] : '';
          var buttons = versions.map(function(version) {
            var sourcePath = item.sources && item.sources[version] ? item.sources[version] : '';
            var fallbackSource = sourceVersions.length && item.sources ? item.sources[sourceVersions[0]] : '';
            return '<button class="version-btn' + (sourcePath ? ' has-source' : '') + '" data-name="' + escapeHtml(item.name) + '" data-version="' + escapeHtml(version) + '" data-source="' + escapeHtml(sourcePath || fallbackSource || '') + '"' + ((sourcePath || fallbackSource) ? '' : ' disabled') + '>' + escapeHtml(version) + '</button>';
          }).join('');

          return '<div class="preset-item">' +
                   '<div class="preset-item-head">' +
                     '<div>' +
                       '<div class="preset-name">' + escapeHtml(item.name) + '</div>' +
                       '<div class="preset-meta">Present sur: ' + escapeHtml(sourceLabel) + '</div>' +
                     '</div>' +
                     '<button class="icon-btn danger" data-delete-preset="1" data-source="' + escapeHtml(deleteSource) + '" aria-label="Supprimer preset">' +
                       '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>' +
                     '</button>' +
                   '</div>' +
                   '<div class="version-actions">' + buttons + '</div>' +
                 '</div>';
        }).join('');

        host.querySelectorAll('[data-delete-preset]').forEach(function(button) {
          button.addEventListener('click', function(ev) {
            ev.stopPropagation();
            var sourcePath = button.dataset.source;
            if (!sourcePath) return;
            send({ type: 'preset.delete', sourcePath: sourcePath });
          });
        });

        host.querySelectorAll('[data-version]').forEach(function(button) {
          button.addEventListener('click', function() {
            var sourcePath = button.dataset.source;
            var version = button.dataset.version;
            if (!sourcePath || !version) return;
            send({ type: 'preset.apply', sourcePath: sourcePath, version: version });
          });
        });
      };

      function renderOnlinePresets() {
        var host = el('onlinePresetBlock');
        var items = state.online && Array.isArray(state.online.items) ? state.online.items : [];
        var summary = el('onlinePresetSummary');
        var latestBtn = el('onlineSortLatest');
        var popularBtn = el('onlineSortPopular');

        if (summary) summary.textContent = items.length + ' preset' + (items.length > 1 ? 's' : '');
        if (latestBtn) latestBtn.className = 'version-btn' + (state.online.order === 'latest' ? ' has-source' : '');
        if (popularBtn) popularBtn.className = 'version-btn' + (state.online.order === 'download' ? ' has-source' : '');

        if (state.online.loading && !items.length) {
          host.innerHTML = '<div class="online-grid"><div class="skel" style="height:212px"></div><div class="skel" style="height:212px"></div></div>';
          return;
        }

        if (!items.length) {
          host.innerHTML = '<div class="empty">Aucun preset en ligne pour le moment.</div>';
          return;
        }

        host.innerHTML = '<div class="online-grid">' + items.map(function(item) {
          var downloadKey = String(item.id || item.title || '');
          var isDownloading = !!state.online.downloading[downloadKey];
          var preview = item.previewUrl
            ? '<img class="online-card-bg" src="' + escapeHtml(item.previewUrl) + '" alt="' + escapeHtml(item.title || 'Preset') + '" loading="lazy" decoding="async" referrerpolicy="no-referrer" onerror="this.remove()">'
            : '';
          return '<article class="online-card">' +
                   '<div class="online-card-body">' +
                     '<div class="online-card-media">' +
                       preview +
                       '<div class="online-card-top">' +
                         '<button class="online-card-link" data-online-open="1" data-online-id="' + escapeHtml(item.id || '') + '"' + (item.id ? '' : ' disabled') + ' aria-label="Ouvrir la fiche">' +
                           '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5h5v5"></path><path d="M10 14 19 5"></path><path d="M19 14v4a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h4"></path></svg>' +
                         '</button>' +
                         '<div class="online-card-chip-row">' +
                           '<span class="online-card-chip">' +
                             '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>' +
                             Number(item.downloads || 0) +
                           '</span>' +
                           '<span class="online-card-chip">' +
                             '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 21s-6.7-4.35-9.33-8.23C.57 9.66 2.17 5.5 6.13 4.55c2.27-.54 4.3.3 5.87 2.23 1.57-1.93 3.6-2.77 5.87-2.23 3.96.95 5.56 5.11 3.46 8.22C18.7 16.65 12 21 12 21Z"></path></svg>' +
                             Number(item.likes || 0) +
                           '</span>' +
                         '</div>' +
                       '</div>' +
                     '</div>' +
                     '<div class="online-card-footer">' +
                       '<div class="online-card-meta">' +
                         '<div class="online-card-title">' + escapeHtml(item.title || 'Preset') + '</div>' +
                         '<div class="online-card-author">par ' + escapeHtml(item.author || 'Auteur inconnu') + '</div>' +
                       '</div>' +
                       '<button class="online-card-download" data-online-download="1" data-download-key="' + escapeHtml(downloadKey) + '" data-dna="' + escapeHtml(item.dnaUrl || '') + '" data-title="' + escapeHtml(item.title || 'Preset') + '"' + ((item.dnaUrl && !isDownloading) ? '' : ' disabled') + ' aria-label="Telecharger preset">' +
                         (isDownloading
                           ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8" opacity=".35"></circle><path d="M20 12a8 8 0 0 0-8-8"></path></svg>'
                           : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg><span>Telecharger</span>') +
                       '</button>' +
                     '</div>' +
                   '</div>' +
                 '</article>';
        }).join('') + '</div>';

        host.querySelectorAll('[data-online-open]').forEach(function(button) {
          button.addEventListener('click', function() {
            if (!button.dataset.onlineId) return;
            send({
              type: 'external.open',
              url: 'https://www.star-citizen-characters.com/character/' + button.dataset.onlineId
            });
          });
        });

        host.querySelectorAll('[data-online-download]').forEach(function(button) {
          button.addEventListener('click', function() {
            var key = button.dataset.downloadKey || '';
            if (!button.dataset.dna || !button.dataset.title || !key) return;
            state.online.downloading[key] = true;
            renderOnlinePresets();
            toast('Telechargement de ' + button.dataset.title + '...', false);
            send({
              type: 'online.preset.download',
              dnaUrl: button.dataset.dna,
              title: button.dataset.title,
              downloadKey: key
            });
          });
        });
      }

      function requestOnlinePresets(page, append) {
        var nextPage = Math.max(1, Number(page || 1) || 1);
        if (state.online.loading) return;
        state.online.loading = true;
        state.online.append = !!append;
        renderOnlinePresets();
        send({
          type: 'online.presets.query',
          page: nextPage,
          order: state.online.order,
          search: state.online.search
        });
      }

      function maybeLoadMoreOnlinePresets() {
        var sentinel = el('onlinePresetSentinel');
        if (!sentinel) return;
        if (state.activeTab !== 'online') return;
        if (!onlineScrollArmed) return;
        if (state.online.loading || !state.online.hasNextPage) return;

        var rect = sentinel.getBoundingClientRect();
        var viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
        if (rect.top <= viewportHeight + 220) {
          requestOnlinePresets((state.online.page || 1) + 1, true);
        }
      }

      function setupOnlineInfiniteScroll() {
        var sentinel = el('onlinePresetSentinel');
        if (!sentinel) return;

        if (onlineObserver) {
          onlineObserver.disconnect();
        }

        onlineObserver = new IntersectionObserver(function(entries) {
          var entry = entries && entries[0];
          if (!entry || !entry.isIntersecting) return;
          if (state.activeTab !== 'online') return;
          if (!onlineScrollArmed) return;
          if (state.online.loading || !state.online.hasNextPage) return;
          requestOnlinePresets((state.online.page || 1) + 1, true);
        }, {
          root: null,
          rootMargin: '320px 0px 320px 0px',
          threshold: 0
        });

        onlineObserver.observe(sentinel);
      }

      function connect() {
        setStatus('connecting', 'Connexion');
        try { ws = new WebSocket(wsUrl); } catch (e) { scheduleReconnect(); return; }
        ws.addEventListener('open', function() {
          backoff = 500;
          setStatus('', 'Connecte');
          send({ type: 'discord.query' });
          send({ type: 'presets.query' });
          state.online.page = 1;
          requestOnlinePresets(1, false);
        });
        ws.addEventListener('message', function(ev) {
          try { handle(JSON.parse(ev.data)); } catch (e) {}
        });
        ws.addEventListener('close', function() {
          setStatus('offline', 'Deconnecte');
          scheduleReconnect();
        });
        ws.addEventListener('error', function() { try { ws.close(); } catch (e) {} });
      }

      function handle(msg) {
        if (!msg || typeof msg !== 'object') return;
        if (msg.type === 'discord.state') { state.discord = msg; saveCache(); renderDiscord(); return; }
        if (msg.type === 'presets.state') { state.presets = msg; saveCache(); renderPresets(); return; }
        if (msg.type === 'online.presets.state') {
          var items = Array.isArray(msg.items) ? msg.items : [];
          var receivedPage = Number(msg.page || 1) || 1;
          state.online.items = state.online.append && receivedPage > 1
            ? state.online.items.concat(items.filter(function(item) {
                return !state.online.items.some(function(existing) { return existing.id === item.id; });
              }))
            : items;
          state.online.page = receivedPage;
          state.online.order = msg.order === 'download' ? 'download' : 'latest';
          state.online.search = typeof msg.search === 'string' ? msg.search : '';
          state.online.hasNextPage = !!msg.hasNextPage;
          state.online.loading = false;
          state.online.append = false;
          saveCache();
          renderOnlinePresets();
          return;
        }
        if (msg.type === 'online.preset.downloaded') {
          // Reset déterministe du spinner : la bridge nous renvoie la downloadKey
          // qu'on lui a passée (= item.id), donc plus de risque de mismatch entre
          // la clé de stockage et le titre du toast.
          var dlKey = String(msg.downloadKey || msg.title || '');
          if (dlKey && state.online.downloading[dlKey]) {
            delete state.online.downloading[dlKey];
          }
          if (!msg.success) {
            // Sécurité : on vide tous les spinners en cas d'erreur pour éviter
            // qu'un autre bouton reste figé si l'id ne match plus rien.
            state.online.downloading = {};
          }
          renderOnlinePresets();
          return;
        }
        if (msg.type === 'toast') {
          toast(String(msg.message || ''), !!msg.isError);
          return;
        }
      }

      function scheduleReconnect() {
        if (reconnectTimer) return;
        reconnectTimer = setTimeout(function() { reconnectTimer = null; connect(); }, backoff);
        backoff = Math.min(backoff * 2, 5000);
      }

      ['navDash', 'navTrad', 'navInfos', 'navTools'].forEach(function(id) {
        var a = el(id);
        if (a) a.href = a.getAttribute('href') + location.search;
      });

      el('presetSearch').addEventListener('input', function() {
        state.query = this.value || '';
        renderPresets();
      });

      el('toolsTabLocal').addEventListener('click', function() {
        state.activeTab = 'local';
        saveCache();
        renderTabs();
      });

      el('toolsTabOnline').addEventListener('click', function() {
        state.activeTab = 'online';
        saveCache();
        renderTabs();
      });

      el('onlinePresetSearch').value = state.online.search || '';
      el('onlinePresetSearch').addEventListener('input', function() {
        state.online.search = this.value || '';
        clearTimeout(window.__onlinePresetSearchTimer);
        window.__onlinePresetSearchTimer = setTimeout(function() {
          state.online.page = 1;
          requestOnlinePresets(1, false);
        }, 320);
      });

      el('onlineSortLatest').addEventListener('click', function() {
        state.online.order = 'latest';
        state.online.page = 1;
        requestOnlinePresets(1, false);
      });

      el('onlineSortPopular').addEventListener('click', function() {
        state.online.order = 'download';
        state.online.page = 1;
        requestOnlinePresets(1, false);
      });

      window.__companionRefresh = function() {
        send({ type: 'discord.query' });
        send({ type: 'presets.query' });
        requestOnlinePresets(1, false);
        return new Promise(function(resolve) { setTimeout(resolve, 450); });
      };

      loadCache();
      window.addEventListener('scroll', function() {
        if (state.activeTab !== 'online') return;
        if (window.scrollY > 96) {
          onlineScrollArmed = true;
        }
      }, { passive: true });
      renderTabs();
      renderDiscord();
      renderPresets();
      renderOnlinePresets();
      setupOnlineInfiniteScroll();
      window.addEventListener('resize', maybeLoadMoreOnlinePresets);
      connect();
    })();
  </script>
