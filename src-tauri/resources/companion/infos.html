<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0a0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Infos · StarTrad FR</title>
  <link rel="manifest" href="/manifest.json?v=3">
  <link rel="icon" type="image/png" href="/logo.png?v=3">
  <link rel="apple-touch-icon" href="/logo.png?v=3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/app.css?v=3">
  <style>
    .svc-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .svc {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--bg-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      font-size: 13px;
    }
    .svc-name { color: var(--ink); font-weight: 500; }
    .server-overall {
      font-family: var(--serif);
      font-size: 30px;
      line-height: 1;
      letter-spacing: -0.015em;
      font-weight: 400;
    }
    .server-overall.operational { color: var(--accent); }
    .server-overall.partial, .server-overall.degraded { color: var(--warning); }
    .server-overall.major, .server-overall.maintenance { color: var(--danger); }
    .server-overall.unknown { color: var(--muted); }

    .news-item { display: block; padding: 16px; transition: border-color .2s var(--ease), transform .15s var(--ease); }
    .news-item:active { transform: scale(0.99); }
    .news-title {
      font-family: var(--serif);
      font-size: 19px;
      font-weight: 400;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .news-meta {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-top: 8px;
      margin-bottom: 8px;
    }
    .news-summary {
      font-size: 13px;
      color: var(--ink-2);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .refresh-btn {
      background: transparent;
      border: 0;
      padding: 0;
      font: inherit;
      color: var(--muted);
      cursor: pointer;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .refresh-btn:hover { color: var(--ink); }

    /* Responsive tablette / paysage */
    @media (min-width: 720px) {
      .server-overall { font-size: 36px; }
      #newsBlock { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .news-title { font-size: 21px; }
    }
    @media (min-width: 1024px) {
      /* Paysage tablette : server + news côte-à-côte */
      .infos-split { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr); gap: 24px; align-items: start; margin-top: 8px; }
      .infos-split > .section { margin-top: 0; }
      .server-overall { font-size: 42px; }
      #newsBlock { grid-template-columns: 1fr; }
    }
    @media (orientation: landscape) and (max-height: 520px) {
      .infos-split { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 14px; align-items: start; }
      .infos-split > .section { margin-top: 0; }
      .server-overall { font-size: 22px; }
      .news-title { font-size: 16px; }
      .news-item { padding: 12px; }
      #newsBlock { gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="page-header">
      <div class="brand">
        <div class="brand-mark"><img src="/logo.png" alt="StarTrad FR"></div>
        <div class="brand-text">
          <span class="brand-name">Infos</span>
          <span class="brand-sub">Statut · Actualités RSI</span>
        </div>
      </div>
      <div class="status-chip">
        <span class="status-dot connecting" id="dot"></span>
        <span id="statusText">Connexion</span>
      </div>
    </header>

    <div class="infos-split">
      <section class="section fade-up">
        <div class="section-head">
          <h2 class="section-title">Statut serveurs</h2>
          <button class="refresh-btn" id="serverTag">—</button>
        </div>
        <div id="serverBlock"><div class="skel"></div></div>
      </section>

      <section class="section fade-up" style="animation-delay:.07s">
        <div class="section-head">
          <h2 class="section-title">Actualités RSI</h2>
          <button class="refresh-btn" id="newsTag">—</button>
        </div>
        <div id="newsBlock" class="grid-1"><div class="skel"></div><div class="skel"></div></div>
      </section>
    </div>
  </div>

  <nav class="dock" aria-label="Navigation">
    <a href="/" class="dock-item" id="navDash" aria-label="Dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
      <span class="dock-label">Dashboard</span>
    </a>
    <a href="/traduction" class="dock-item" id="navTrad" aria-label="Traduction">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
      <span class="dock-label">Traduction</span>
    </a>
    <a href="/outils" class="dock-item" id="navTools" aria-label="Outils">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 1 1.4 0l1.6 1.6a1 1 0 0 1 0 1.4l-7.8 7.8-3.1.8.8-3.1 7.1-7.1Z"></path><path d="M16 4l4 4"></path><path d="M12 20h9"></path></svg>
      <span class="dock-label">Outils</span>
    </a>
    <a href="/infos" class="dock-item active" id="navInfos" aria-label="Infos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <span class="dock-label">Infos</span>
    </a>
  </nav>

  <div class="toast" id="toast"></div>

  <script src="/companion.js?v=3"></script>
  <script>
    (function() {
      var token = new URLSearchParams(location.search).get('token') || '';
      var wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws?token=' + encodeURIComponent(token);
      var ws = null;
      var reconnectTimer = null;
      var backoff = 500;
      var CACHE_KEY = 'startrad-companion-infos-cache-v1';
      var state = { server: null, news: null };

      function el(id) { return document.getElementById(id); }

      function saveCache() {
        try {
          localStorage.setItem(CACHE_KEY, JSON.stringify({
            server: state.server || null,
            news: state.news || null
          }));
        } catch (e) {}
      }

      function loadCache() {
        try {
          var raw = localStorage.getItem(CACHE_KEY);
          if (!raw) return;
          var cached = JSON.parse(raw);
          if (!cached || typeof cached !== 'object') return;
          state.server = cached.server || state.server;
          state.news = cached.news || state.news;
        } catch (e) {}
      }

      function setStatus(cls, text) {
        el('dot').className = 'status-dot ' + (cls || '');
        el('statusText').textContent = text;
      }

      function toast(msg, isErr) {
        var t = el('toast');
        t.textContent = msg;
        t.className = 'toast show' + (isErr ? ' err' : '');
        setTimeout(function() { t.className = 'toast' + (isErr ? ' err' : ''); }, 1900);
      }

      function send(msg) {
        if (!ws || ws.readyState !== 1) return false;
        ws.send(JSON.stringify(msg));
        return true;
      }

      function escapeHtml(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }

      function fmtAge(ts) {
        var diff = Math.floor((Date.now() - ts) / 1000);
        if (diff < 30) return 'à l\'instant';
        if (diff < 60) return 'il y a ' + diff + 's';
        var m = Math.floor(diff / 60);
        if (m < 60) return 'il y a ' + m + 'min';
        var h = Math.floor(m / 60);
        if (h < 24) return 'il y a ' + h + 'h';
        return 'il y a ' + Math.floor(h / 24) + 'j';
      }

      var STATUS_LABEL = {
        operational: 'Opérationnel',
        maintenance: 'Maintenance',
        partial: 'Partiel',
        major: 'Panne majeure',
        degraded: 'Dégradé',
        unknown: 'Inconnu',
      };

      var STATUS_PILL = {
        operational: 'accent',
        maintenance: 'danger',
        partial: 'warn',
        major: 'danger',
        degraded: 'warn',
        unknown: 'muted',
      };

      function renderServer() {
        var block = el('serverBlock');
        if (!state.server) { block.innerHTML = '<div class="skel"></div>'; return; }
        var s = state.server;
        el('serverTag').textContent = s.error ? 'erreur · retry' : fmtAge(s.fetchedAt || Date.now());
        if (!s.services || s.services.length === 0) {
          block.innerHTML = '<div class="card"><div class="empty" style="border:0;padding:0">Indisponible pour le moment.</div></div>';
          return;
        }
        var overallClass = s.overall || 'unknown';
        var overallLabel = STATUS_LABEL[overallClass] || 'Inconnu';
        var list = s.services.map(function(svc) {
          var cls = svc.status || 'unknown';
          return '<div class="svc"><span class="svc-name">' + escapeHtml(svc.name) + '</span>' +
                 '<span class="pill ' + (STATUS_PILL[cls] || 'muted') + '">' + (STATUS_LABEL[cls] || cls) + '</span></div>';
        }).join('');
        block.innerHTML =
          '<div class="card fade-up">' +
            '<div class="card-row">' +
              '<span class="server-overall ' + overallClass + '">' + overallLabel + '</span>' +
              '<span class="pill ' + (STATUS_PILL[overallClass] || 'muted') + '">' + overallClass.toUpperCase() + '</span>' +
            '</div>' +
            '<div class="svc-list">' + list + '</div>' +
          '</div>';
      }

      function renderNews() {
        var block = el('newsBlock');
        if (!state.news) { block.innerHTML = '<div class="skel"></div><div class="skel"></div>'; return; }
        var n = state.news;
        el('newsTag').textContent = n.error ? 'erreur · retry' : fmtAge(n.fetchedAt || Date.now());
        if (!n.items || n.items.length === 0) {
          block.innerHTML = '<div class="empty">Aucune actualité.</div>';
          return;
        }
        block.innerHTML = n.items.slice(0, 8).map(function(item, idx) {
          var date = '';
          if (item.updated) {
            try {
              var d = new Date(item.updated);
              if (!isNaN(d.getTime())) {
                date = d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
              }
            } catch (e) {}
          }
          return '<a class="card news-item fade-up" data-url="' + escapeHtml(item.link || '') + '" href="' + escapeHtml(item.link || '#') + '" target="_blank" rel="noopener" style="animation-delay:' + (idx * 50) + 'ms">' +
                   '<div class="news-title">' + escapeHtml(item.title) + '</div>' +
                   (date ? '<div class="news-meta">' + escapeHtml(date) + '</div>' : '') +
                   (item.summary ? '<div class="news-summary">' + escapeHtml(item.summary) + '</div>' : '') +
                 '</a>';
        }).join('');

        block.querySelectorAll('[data-url]').forEach(function(a) {
          a.addEventListener('click', function() {
            var url = a.dataset.url;
            if (url) send({ type: 'external.open', url: url });
          });
        });
      }

      function connect() {
        setStatus('connecting', 'Connexion');
        try { ws = new WebSocket(wsUrl); } catch (e) { scheduleReconnect(); return; }
        ws.addEventListener('open', function() {
          backoff = 500;
          setStatus('', 'Connecté');
          send({ type: 'server.query' });
          send({ type: 'news.query' });
        });
        ws.addEventListener('message', function(ev) {
          try { handle(JSON.parse(ev.data)); } catch (e) {}
        });
        ws.addEventListener('close', function() {
          setStatus('offline', 'Déconnecté');
          scheduleReconnect();
        });
        ws.addEventListener('error', function() { try { ws.close(); } catch (e) {} });
      }

      function handle(msg) {
        if (!msg || typeof msg !== 'object') return;
        if (msg.type === 'server.state') { state.server = msg; saveCache(); renderServer(); return; }
        if (msg.type === 'news.state')   { state.news = msg; saveCache(); renderNews(); return; }
        if (msg.type === 'toast')        { toast(msg.message || '', !!msg.isError); return; }
      }

      function scheduleReconnect() {
        if (reconnectTimer) return;
        reconnectTimer = setTimeout(function() { reconnectTimer = null; connect(); }, backoff);
        backoff = Math.min(backoff * 2, 5000);
      }

      ['navDash', 'navTrad', 'navInfos', 'navTools'].forEach(function(id) {
        var a = el(id);
        if (a) a.href = a.getAttribute('href') + location.search;
      });

      // Tap sur la pill temps => refresh manuel
      el('serverTag').addEventListener('click', function() { send({ type: 'server.query' }); });
      el('newsTag').addEventListener('click', function() { send({ type: 'news.query' }); });

      window.__companionRefresh = function() {
        send({ type: 'server.query' });
        send({ type: 'news.query' });
        return new Promise(function(resolve) { setTimeout(resolve, 450); });
      };

      loadCache();
      renderServer();
      renderNews();
      connect();
    })();
  </script>
</body>
</html>
